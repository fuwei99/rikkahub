name: Release Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'web-ui/pnpm-lock.yaml'

      - name: Install web-ui dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web-ui

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare build files
        run: |
          # 解码base64编码的keystore文件
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          
          # 写入签名配置到local.properties
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          
          # 写入Google Services配置 (如果Secret为空或无效，则写入Mock配置以通过编译)
          GOOGLE_SERVICES_VAL='${{ secrets.GOOGLE_SERVICES_JSON }}'
          if [[ -z "$GOOGLE_SERVICES_VAL" || "$GOOGLE_SERVICES_VAL" != \{* ]]; then
            echo "Using mock google-services.json"
            echo '{
              "project_info": { "project_number": "1234567890", "project_id": "mock-project" },
              "client": [{
                "client_info": { "mobilesdk_app_id": "1:1234567890:android:abc", "android_client_info": { "package_name": "me.rerere.rikkahub" } },
                "api_key": [{ "current_key": "mock_api_key_value" }],
                "services": {}
              }],
              "configuration_version": "1"
            }' > app/google-services.json
          else
            echo "Using secrets.GOOGLE_SERVICES_JSON"
            echo "$GOOGLE_SERVICES_VAL" > app/google-services.json
          fi

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: artifacts
          path: app/build/outputs/apk/release/*.apk
